<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipes Overview</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
    .header { margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
    h1 { margin: 0; }
    .add-recipe-btn {
      background-color: #0066cc;
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      text-decoration: none;
      font-size: 0.95rem;
      transition: background-color 0.2s;
    }
    .add-recipe-btn:hover {
      background-color: #004d99;
      text-decoration: none;
    }
    .recipe-list { list-style: none; padding: 0; }
    .recipe-card { padding: 1rem; margin: 0.75rem 0; background: #f8f9fa; border-radius: 6px; }
    .recipe-name { margin: 0 0 0.5rem 0; font-size: 1.25rem; }
    .recipe-name a { color: #0066cc; text-decoration: none; }
    .recipe-name a:hover { text-decoration: underline; }
    .recipe-detail { margin: 0.25rem 0; color: #333; font-size: 0.95rem; }
    .recipe-detail span { font-weight: 600; }
    .no-data { color: #666; font-style: italic; }
    #status { margin-top: 1rem; padding: 0.75rem; border-radius: 4px; display: none; }
    #status.error { background: #fce8e8; color: #c5221f; display: block; }
    .loading { color: #666; font-style: italic; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Recipes Overview</h1>
    <a href="/add-recipe.html" class="add-recipe-btn">Add New Recipe</a>
  </div>
  <ul id="recipes-list" class="recipe-list">
    <li class="loading">Loading recipes…</li>
  </ul>
  <div id="status"></div>

  <script>
    const recipesList = document.getElementById('recipes-list');
    const statusEl = document.getElementById('status');

    function showStatus(msg, isError) {
      statusEl.textContent = msg;
      statusEl.className = isError ? 'error' : '';
      if (!isError) statusEl.style.display = 'none';
    }

    async function loadRecipes() {
      try {
        const response = await fetch('/.netlify/functions/index');
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Failed to load recipes');
        }

        recipesList.innerHTML = '';

        if (data.length === 0) {
          const li = document.createElement('li');
          li.className = 'no-data';
          li.textContent = 'No recipes found.';
          recipesList.appendChild(li);
          return;
        }

        data.forEach((recipe) => {
          const li = document.createElement('li');
          li.className = 'recipe-card';

          // Recipe name linked to detail page
          const nameEl = document.createElement('h2');
          nameEl.className = 'recipe-name';
          const link = document.createElement('a');
          link.href = `/view-recipe.html?id=${recipe.id}`;
          link.textContent = recipe.name;
          nameEl.appendChild(link);

          // Source detail
          const sourceEl = document.createElement('p');
          sourceEl.className = 'recipe-detail';
          const sourceText = recipe.source ? recipe.source : 'Not specified';
          sourceEl.innerHTML = `<span>Source:</span> ${sourceText}`;

          // Categories detail
          const categoriesEl = document.createElement('p');
          categoriesEl.className = 'recipe-detail';
          if (recipe.categories.length > 0) {
            categoriesEl.innerHTML = `<span>Categories:</span> ${recipe.categories.join(', ')}`;
          } else {
            categoriesEl.innerHTML = `<span>Categories:</span> <span class="no-data">None</span>`;
          }

          li.appendChild(nameEl);
          li.appendChild(sourceEl);
          li.appendChild(categoriesEl);
          recipesList.appendChild(li);
        });
      } catch (error) {
        showStatus('Error loading recipes: ' + error.message, true);
        recipesList.innerHTML = '';
      }
    }

    loadRecipes();
  </script>
</body>
</html>
